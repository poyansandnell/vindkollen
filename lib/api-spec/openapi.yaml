openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: wind
    description: Wind power project, turbine and locality operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: projects
    description: User-created wind placement projects.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /wind/project-areas:
    get:
      operationId: listWindProjectAreas
      tags: [wind]
      summary: List wind project areas near a point
      description: Returns onshore and offshore wind project area polygons within a radius of a point, or within a bounding box.
      parameters:
        - name: lat
          in: query
          schema: { type: number }
        - name: lng
          in: query
          schema: { type: number }
        - name: radiusKm
          in: query
          schema: { type: number, default: 60 }
        - name: minLat
          in: query
          schema: { type: number }
        - name: minLng
          in: query
          schema: { type: number }
        - name: maxLat
          in: query
          schema: { type: number }
        - name: maxLng
          in: query
          schema: { type: number }
        - name: statuses
          in: query
          description: Comma-separated list of statuses to include
          schema: { type: string }
        - name: category
          in: query
          description: Filter by onshore or offshore
          schema: { type: string, enum: [onshore, offshore] }
        - name: countryCode
          in: query
          schema: { type: string, default: SE }
        - name: detail
          in: query
          description: >-
            "summary" omits the (often large) polygon geometry to keep nationwide/low-zoom
            responses small; "full" includes it. Defaults to "full".
          schema: { type: string, enum: [full, summary], default: full }
      responses:
        "200":
          description: List of wind project areas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WindProjectArea"
  /wind/project-areas/{id}:
    get:
      operationId: getWindProjectArea
      tags: [wind]
      summary: Get a single wind project area
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: lat
          in: query
          description: Optional reference point latitude to compute distanceKm from
          schema: { type: number }
        - name: lng
          in: query
          description: Optional reference point longitude to compute distanceKm from
          schema: { type: number }
      responses:
        "200":
          description: Wind project area
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WindProjectArea"
        "404":
          description: Not found
  /wind/turbines:
    get:
      operationId: listWindTurbines
      tags: [wind]
      summary: List individual wind turbines near a point or bounding box
      parameters:
        - name: lat
          in: query
          schema: { type: number }
        - name: lng
          in: query
          schema: { type: number }
        - name: radiusKm
          in: query
          schema: { type: number, default: 60 }
        - name: minLat
          in: query
          schema: { type: number }
        - name: minLng
          in: query
          schema: { type: number }
        - name: maxLat
          in: query
          schema: { type: number }
        - name: maxLng
          in: query
          schema: { type: number }
        - name: statuses
          in: query
          description: Comma-separated list of statuses to include
          schema: { type: string }
        - name: countryCode
          in: query
          schema: { type: string, default: SE }
        - name: limit
          in: query
          schema: { type: integer, default: 5000 }
      responses:
        "200":
          description: List of wind turbines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WindTurbine"
  /wind/turbines/{id}:
    get:
      operationId: getWindTurbine
      tags: [wind]
      summary: Get a single wind turbine
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: lat
          in: query
          description: Optional reference point latitude to compute distanceKm from
          schema: { type: number }
        - name: lng
          in: query
          description: Optional reference point longitude to compute distanceKm from
          schema: { type: number }
      responses:
        "200":
          description: Wind turbine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WindTurbine"
        "404":
          description: Not found
  /wind/localities/search:
    get:
      operationId: searchLocalities
      tags: [wind]
      summary: Search Swedish localities by name, kommun or postcode
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: countryCode
          in: query
          schema: { type: string, default: SE }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Matching localities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Locality"
  /wind/localities/{id}:
    get:
      operationId: getLocality
      tags: [wind]
      summary: Get a locality and its impact detail
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Locality impact detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalityImpactDetail"
        "404":
          description: Not found
  /wind/localities/best-to-test:
    get:
      operationId: listBestLocalitiesToTest
      tags: [wind]
      summary: Ranked list of localities most relevant for a local campaign
      parameters:
        - name: countryCode
          in: query
          schema: { type: string, default: SE }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Ranked localities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LocalityRanking"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema: { type: string }
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /projects:
    get:
      tags: [projects]
      operationId: listUserProjects
      summary: List all projects for the authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: List of user projects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserProject'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [projects]
      operationId: createUserProject
      summary: Create a new user project
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectBody'
      responses:
        '201':
          description: Project created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProject'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /projects/{id}:
    get:
      tags: [projects]
      operationId: getUserProject
      summary: Get a single project (authenticated owner or via share token)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: shareToken
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Project data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProject'
        '404':
          description: Not found.
    put:
      tags: [projects]
      operationId: updateUserProject
      summary: Update a project (owner only)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectBody'
      responses:
        '200':
          description: Updated project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProject'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
    delete:
      tags: [projects]
      operationId: deleteUserProject
      summary: Delete a project (owner only)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deleted.
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
  /projects/{id}/share:
    post:
      tags: [projects]
      operationId: generateProjectShareLink
      summary: Generate a share token for a project
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Share link generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareLinkResponse'
        '401':
          description: Not authenticated.
        '404':
          description: Not found.
  /config:
    get:
      operationId: getPublicConfig
      tags: [health]
      summary: Public frontend configuration
      description: Returns public configuration values needed by frontend clients (e.g. Mapbox token).
      responses:
        "200":
          description: Public config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicConfig"
  /wind/sync-status:
    get:
      operationId: getWindSyncStatus
      tags: [wind]
      summary: Latest data sync status and row counts
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WindSyncStatus"
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    UserProject:
      type: object
      required: [id, name, turbineCount, createdAt, updatedAt]
      properties:
        id:
          type: string
        userId:
          type: [string, 'null']
        name:
          type: string
        location:
          type: [string, 'null']
        municipality:
          type: [string, 'null']
        turbines:
          type: array
          items: {}
        analysisResult:
          nullable: true
        shareToken:
          type: [string, 'null']
        centerLat:
          type: [string, 'null']
        centerLng:
          type: [string, 'null']
        turbineCount:
          type: string
        totalScore:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateProjectBody:
      type: object
      required: [name, turbines]
      properties:
        name:
          type: string
        location:
          type: [string, 'null']
        municipality:
          type: [string, 'null']
        turbines:
          type: array
          items: {}
        analysisResult:
          nullable: true
        centerLat:
          type: [string, 'null']
        centerLng:
          type: [string, 'null']
        turbineCount:
          type: string
        totalScore:
          type: [string, 'null']
    UpdateProjectBody:
      type: object
      properties:
        name:
          type: string
        location:
          type: [string, 'null']
        municipality:
          type: [string, 'null']
        turbines:
          type: array
          items: {}
        analysisResult:
          nullable: true
        centerLat:
          type: [string, 'null']
        centerLng:
          type: [string, 'null']
        turbineCount:
          type: string
        totalScore:
          type: [string, 'null']
    ShareLinkResponse:
      type: object
      required: [shareToken, shareUrl]
      properties:
        shareToken:
          type: string
        shareUrl:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    WindProjectArea:
      type: object
      required: [id, countryCode, category, name, status, sourceLayer]
      properties:
        id: { type: integer }
        countryCode: { type: string }
        externalId: { type: ["string", "null"] }
        category: { type: string, enum: [onshore, offshore] }
        name: { type: string }
        status: { type: string }
        kommun: { type: ["string", "null"] }
        region: { type: ["string", "null"] }
        turbineCountPlannedMin: { type: ["integer", "null"] }
        turbineCountPlannedMax: { type: ["integer", "null"] }
        heightMaxM: { type: ["number", "null"] }
        installedEffectMw: { type: ["number", "null"] }
        annualProductionGwh: { type: ["number", "null"] }
        plannedConstructionStart: { type: ["string", "null"] }
        plannedOperationDate: { type: ["string", "null"] }
        organisationName: { type: ["string", "null"] }
        centerLat: { type: "number" }
        centerLng: { type: "number" }
        polygon:
          description: GeoJSON Polygon/MultiPolygon geometry, or null if unavailable
          type: ["object", "null"]
        nearestLocalityId: { type: ["integer", "null"] }
        nearestLocalityName: { type: ["string", "null"] }
        nearestLocalityDistanceKm: { type: ["number", "null"] }
        source: { type: string }
        sourceLayer: { type: string }
        lastUpdated: { type: ["string", "null"], format: date-time }
        distanceKm:
          description: Distance in km from the query point, only present when lat/lng was supplied
          type: ["number", "null"]
    WindTurbine:
      type: object
      required: [id, countryCode, name, status]
      properties:
        id: { type: integer }
        countryCode: { type: string }
        externalId: { type: ["string", "null"] }
        projectAreaId: { type: ["integer", "null"] }
        name: { type: string }
        status: { type: string }
        kommun: { type: ["string", "null"] }
        region: { type: ["string", "null"] }
        totalHeightM: { type: ["number", "null"] }
        hubHeightM: { type: ["number", "null"] }
        rotorDiameterM: { type: ["number", "null"] }
        maxEffectMw: { type: ["number", "null"] }
        manufacturer: { type: ["string", "null"] }
        model: { type: ["string", "null"] }
        organisationName: { type: ["string", "null"] }
        lat: { type: "number" }
        lng: { type: "number" }
        nearestLocalityId: { type: ["integer", "null"] }
        nearestLocalityName: { type: ["string", "null"] }
        nearestLocalityDistanceKm: { type: ["number", "null"] }
        source: { type: string }
        lastUpdated: { type: ["string", "null"], format: date-time }
        distanceKm:
          description: Distance in km from the query point, only present when lat/lng was supplied
          type: ["number", "null"]
    Locality:
      type: object
      required: [id, countryCode, name, lat, lng]
      properties:
        id: { type: integer }
        countryCode: { type: string }
        name: { type: string }
        kommun: { type: ["string", "null"] }
        region: { type: ["string", "null"] }
        population: { type: ["integer", "null"] }
        postcodes:
          type: array
          items: { type: string }
        lat: { type: number }
        lng: { type: number }
        distanceKm:
          type: ["number", "null"]
    LocalityImpactDetail:
      type: object
      required: [locality, impactScore, nearbyProjectAreas, nearbyTurbines]
      properties:
        locality:
          $ref: "#/components/schemas/Locality"
        impactScore: { type: number }
        scoreBreakdown:
          type: object
          properties:
            distanceScore: { type: number }
            plannedTurbinesScore: { type: number }
            existingTurbinesScore: { type: number }
            statusScore: { type: number }
            populationScore: { type: number }
            visibilityScore: { type: number }
        turbineCountWithin25Km: { type: integer }
        turbineCountWithin60Km: { type: integer }
        projectAreaCountWithin25Km: { type: integer }
        projectAreaCountWithin60Km: { type: integer }
        nearbyProjectAreas:
          type: array
          items:
            $ref: "#/components/schemas/WindProjectArea"
        nearbyTurbines:
          type: array
          items:
            $ref: "#/components/schemas/WindTurbine"
    LocalityRanking:
      type: object
      required: [locality, impactScore, rank]
      properties:
        rank: { type: integer }
        locality:
          $ref: "#/components/schemas/Locality"
        impactScore: { type: number }
        turbineCountWithin25Km: { type: integer }
        turbineCountWithin60Km: { type: integer }
        projectAreaCountWithin25Km: { type: integer }
        projectAreaCountWithin60Km: { type: integer }
        dominantStatus: { type: ["string", "null"] }
    PublicConfig:
      type: object
      required: [mapboxToken]
      properties:
        mapboxToken: { type: ["string", "null"] }
    WindSyncStatus:
      type: object
      required: [countryCode, projectAreaCount, turbineCount, localityCount]
      properties:
        countryCode: { type: string }
        projectAreaCount: { type: integer }
        turbineCount: { type: integer }
        localityCount: { type: integer }
        lastSyncedAt: { type: ["string", "null"], format: date-time }
        scheduler:
          type: object
          description: Status of the in-process automatic re-sync scheduler.
          required: [enabled, intervalHours, isRunning]
          properties:
            enabled: { type: boolean }
            intervalHours: { type: number }
            isRunning: { type: boolean }
            lastRunStartedAt: { type: ["string", "null"], format: date-time }
            lastRunFinishedAt: { type: ["string", "null"], format: date-time }
            lastRunStatus: { type: ["string", "null"], enum: [ok, error, null] }
            lastRunError: { type: ["string", "null"] }
            nextRunAt: { type: ["string", "null"], format: date-time }

