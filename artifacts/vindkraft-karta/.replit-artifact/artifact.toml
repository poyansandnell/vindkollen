kind = "web"
previewPath = "/vindkraft-karta/"
title = "Vindkraft Karta Sverige"
version = "1.0.0"
id = "artifacts/vindkraft-karta"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/vindkraft-karta/" ]
localPort = 20152

[services.development]
run = "pnpm --filter @workspace/vindkraft-karta run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vindkraft-karta", "run", "build" ]
publicDir = "artifacts/vindkraft-karta/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20152"
BASE_PATH = "/vindkraft-karta/"
