name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  XCODE_VERSION: '26.2'
  IOS_VERSION: '26.2'

jobs:
  test:
    name: Build & Test
    runs-on: macos-15

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup Xcode
      run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

    - name: Install xcbeautify
      run: brew install xcbeautify

    - name: Build & Test iOS
      run: |
        set -o pipefail
        xcodebuild -scheme IONCameraLib \
          -destination 'platform=iOS Simulator,name=iPhone 17,OS=${{ env.IOS_VERSION }}' \
          build test | xcbeautify

  lint:
    name: SwiftLint
    runs-on: macOS-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install SwiftLint
      run: |
        if ! command -v swiftlint &> /dev/null; then
          brew install swiftlint
        fi

    - name: SwiftLint
      run: swiftlint --strict

  validate-podspec:
    name: Validate Podspec
    runs-on: macOS-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install CocoaPods
      run: gem install cocoapods --no-document

    - name: Validate Podspec
      run: pod lib lint IONCameraLib.podspec --allow-warnings
