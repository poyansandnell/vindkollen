name: Release

on:
  workflow_dispatch: {}

env:
  XCODE_VERSION: '26.2'
  IOS_VERSION: '26.2'
  NODE_VERSION: '24'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test:
    name: Test Before Release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build & Test iOS
        run: |
          set -o pipefail
          xcodebuild -scheme IONCameraLib \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=${{ env.IOS_VERSION }}' \
            build test | xcbeautify

      - name: Validate Podspec
        run: |
          gem install cocoapods --no-document
          pod lib lint IONCameraLib.podspec --allow-warnings

  release:
    name: Release
    runs-on: macos-15
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.CAP_GH_RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.CAP_GH_RELEASE_TOKEN }}
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: npx semantic-release


